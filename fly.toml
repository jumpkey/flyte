app = "flyte"
primary_region = "iad"

[build]

[deploy]
  release_command = "node dist/scripts/migrate.js"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
